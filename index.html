<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FORENSIK-DATENBANK - POLIZEIDIREKTION WALDVILLA</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --primary-dir: #1a365d; 
            --accent-red: #c53030;  
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #cbd5e0;
            --input-bg: #edf2f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .terminal-container {
            width: 100%;
            max-width: 950px;
            height: 85vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .terminal-header {
            background-color: var(--primary-dir);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-red);
        }

        .terminal-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .security-badge {
            background-color: var(--accent-red);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 2px;
            letter-spacing: 1px;
        }

        .screen {
            flex: 1;
            display: none;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        .login-box {
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 30px;
            background-color: #f7fafc;
            border-radius: 4px;
            text-align: center;
        }

        .login-header-text {
            color: var(--primary-dir);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .login-instructions {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 13px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            width: 100%;
        }

        .terminal-input {
            width: 100%;
            background-color: white;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            border-radius: 3px;
            transition: border-color 0.2s;
        }

        .terminal-input:focus {
            border-color: var(--primary-dir);
        }

        .terminal-button {
            background-color: var(--primary-dir);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .terminal-button:hover {
            background-color: #2b4c7e;
        }

        .error-message {
            color: var(--accent-red);
            margin-top: 15px;
            font-size: 12px;
            font-weight: bold;
            height: 15px;
            visibility: hidden;
        }

        .main-screen {
            justify-content: flex-start !important;
            align-items: stretch !important;
            padding: 30px;
        }

        .metadata-panel {
            background-color: #edf2f7;
            border-left: 4px solid var(--primary-dir);
            padding: 15px 20px;
            margin-bottom: 25px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-main);
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 5px 10px;
        }

        .metadata-label {
            font-weight: bold;
            color: var(--primary-dir);
        }
